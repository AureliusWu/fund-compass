# Render Blueprint: deploy backend on Render. Create a Blueprint from this repo.
services:
  - type: web
    name: fund-compass-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ADMIN_TOKEN
        sync: false
      - key: WORKER_TOKEN
        sync: false
