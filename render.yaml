# Render Blueprint: deploy backend on Render. Create a Blueprint from this repo.
services:
  - type: web
    name: fund-compass-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7

  - type: cron
    name: fund-compass-estimate-push
    runtime: python
    rootDir: .
    plan: starter
    schedule: "30 6 * * 1-5" # UTC 06:30 = Beijing 14:30, Monday-Friday
    buildCommand: "python --version"
    startCommand: "python tools/estimate_push.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: PUSH_SLOT
        value: "14:30"
      - key: GIST_TOKEN
        sync: false
      - key: PUSHPLUS_TOKEN
        sync: false
      - key: PUSHPLUS_TOPIC
        sync: false
      - key: WECHAT_SENDKEY
        sync: false
      - key: SC_SENDKEY
        sync: false
      - key: NOTIFY_WEBHOOK_URL
        sync: false
      - key: FUND_API_BASE
        sync: false
