name: estimate-push

# 司南基金 · 交易日 14:20 前后自选估值推送
# 仅在当日有盘中估值（=交易日）时推送，自动避开周末/节假日。复用 V2-6 的 Secret。
# GitHub 免费定时任务会延迟/丢弃单次触发，故在窗口内多触发几次，脚本按 Gist 状态做当天去重，
# 保证一天最多推一条。
on:
  schedule:
    - cron: '15,25,35 6 * * 1-5' # UTC 06:15/06:25/06:35 周一~五 = CST 14:15/14:25/14:35
  workflow_dispatch:
    inputs:
      force:
        description: 忽略交易日判断强制推送（测试用）
        type: boolean
        default: false

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 估值推送
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          SC_SENDKEY: ${{ secrets.SC_SENDKEY }}
          FORCE: ${{ inputs.force }}
          PYTHONUNBUFFERED: '1'
        run: python tools/estimate_push.py
