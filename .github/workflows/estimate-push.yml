name: estimate-push

# 司南基金 · 交易日北京时间 14:30 自选实时估值推送。
# Render cron 是主触发器；GitHub Actions 作为兜底，脚本会跳过延迟超过 25 分钟的旧任务。
on:
  schedule:
    - cron: '30 6 * * 1-5' # UTC 06:30 周一~五 = CST 14:30
  workflow_dispatch:
    inputs:
      force:
        description: 忽略交易日判断强制推送（测试用）
        type: boolean
        default: false
      slot:
        description: 推送时段（测试用，目前仅支持 14:30；留空则按当前北京时间）
        type: string
        default: ''

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 估值推送
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          WECHAT_SENDKEY: ${{ secrets.WECHAT_SENDKEY }}
          SC_SENDKEY: ${{ secrets.SC_SENDKEY }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          FUND_API_BASE: ${{ secrets.FUND_API_BASE }}
          FORCE: ${{ inputs.force }}
          PUSH_SLOT: ${{ inputs.slot }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
          PYTHONUNBUFFERED: '1'
        run: python tools/estimate_push.py
      - name: 更新海外估值误差账本
        env:
          FUND_API_BASE: ${{ secrets.FUND_API_BASE }}
          PYTHONUNBUFFERED: '1'
        run: python tools/overseas_accuracy.py
      - name: 校准海外 Challenger
        env:
          AUTO_PROMOTE_OVERSEAS: 'true'
          OVERSEAS_MIN_SAMPLES: '20'
        run: python tools/calibrate_overseas.py
      - name: 审计海外精度账本
        run: python tools/audit_overseas_accuracy.py
      - name: 写入海外精度摘要
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          data = json.loads(Path("frontend/public/data/overseas-accuracy.json").read_text(encoding="utf-8"))
          print("## 海外估值精度")
          for code, row in (data.get("summary") or {}).items():
              print(f"- {code}: {row.get('samples', 0)} 样本 · MAE {row.get('mae')} · 方向命中 {row.get('direction_accuracy')} · {row.get('confidence')}")
          PY
      - name: 上传海外精度周转数据
        uses: actions/upload-artifact@v4
        with:
          name: overseas-accuracy-${{ github.run_number }}
          path: |
            frontend/public/data/overseas-accuracy.json
            frontend/public/data/overseas-audit.json
            frontend/src/data/overseas-models.json
          retention-days: 90
      - name: 提交海外精度数据
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain frontend/public/data/overseas-accuracy.json frontend/public/data/overseas-audit.json frontend/src/data/overseas-models.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add frontend/public/data/overseas-accuracy.json frontend/public/data/overseas-audit.json frontend/src/data/overseas-models.json
            git commit -m "chore: 更新海外估值精度账本"
            git push
          else
            echo "海外精度数据无变化"
          fi
