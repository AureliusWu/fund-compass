name: fund-universe

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fund-universe.yml'
      - 'tools/build_universe.py'
      - 'backend/tests/test_universe_artifact.py'
      - 'backend/requirements.txt'
      - 'backend/requirements-dev.txt'
  schedule:
    - cron: '20 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fund-universe
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: python -m pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - run: python tools/build_universe.py
      - run: python -m pytest tests/test_universe_artifact.py
        working-directory: backend
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh fund universe artifact'
          file_pattern: 'backend/data/fund-universe.json.gz backend/data/fund-universe.meta.json'
