name: manual-signal-notify

# 司南基金 · 信号通知人工应急入口。
# 盘中实时决策由页面直连后端 API 完成，不再使用 GitHub Actions 定时轮询或保活。
on:
  workflow_dispatch:
    inputs:
      force:
        description: 忽略交易时段强制运行（并发一条推送测试）
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: manual-signal-notify
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 人工信号检查与推送
        env:
          API_BASE: ${{ vars.VITE_API_BASE || 'https://fund-compass-api.onrender.com/api' }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          SC_SENDKEY: ${{ secrets.SC_SENDKEY }}
          FORCE: ${{ inputs.force }}
        run: python tools/notify.py
