name: enrich-holdings

# 司南基金 · AKShare 离线富集（持仓+行业）。
# 季度披露，故每周一跑一次足矣 + 可手动触发。抓 tools/enrich_funds.txt ∪ Gist 自选，
# 输出 frontend/public/data/enrich/*.json 并提交（随 Pages 部署）。
on:
  schedule:
    - cron: '0 1 * * 1' # 每周一 UTC 01:00 ≈ CST 09:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # akshare 抓取若卡住，最多 20 分钟自动终止，不空耗
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 安装 akshare
        run: pip install -r tools/requirements-enrich.txt
      - name: 富集持仓（akshare）
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          PYTHONUNBUFFERED: '1' # 日志实时输出，能看到「抓取 X …」进度
        run: python tools/enrich.py
      - name: 富集指数估值（akshare · 乐咕乐股）· V3-5
        continue-on-error: true # 第三方源，失败不阻断持仓/排行/经理富集
        env:
          PYTHONUNBUFFERED: '1'
        run: python tools/enrich_index_valuation.py
      - name: 富集排行（东财排行，requests）
        env:
          PYTHONUNBUFFERED: '1'
        run: python tools/screener.py
      - name: 富集基金经理（东财经理，requests）
        env:
          PYTHONUNBUFFERED: '1'
        run: python tools/managers.py
      - name: 跨基金校准策略参数
        id: calibrate
        continue-on-error: true
        env:
          AUTO_PROMOTE_STRATEGY: 'true'
          CALIBRATION_MIN_VALID: '12'
          CALIBRATION_MAX_FUNDS: '30'
          FUND_API_BASE: ${{ secrets.FUND_API_BASE }}
          PYTHONUNBUFFERED: '1'
        run: python tools/calibrate_strategy.py
      - name: 上传策略校准报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-calibration-${{ github.run_number }}
          path: |
            frontend/public/data/strategy-calibration.json
            backend/data/strategy-params.json
          retention-days: 90
      - name: 写入任务摘要
        if: always()
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          path = Path("frontend/public/data/strategy-calibration.json")
          print("## 策略校准")
          if not path.exists():
              print("校准报告未生成，任务失败且 active 参数未被修改。")
          else:
              data = json.loads(path.read_text(encoding="utf-8"))
              s = data.get("summary") or {}
              c = data.get("candidate") or {}
              print(f"- 样本：{s.get('valid', 0)}/{s.get('sampled', 0)} 有效")
              print(f"- 候选：{c.get('status', 'unknown')}")
              print(f"- 支持：{s.get('winner_votes', 0)}/{s.get('required_votes', 0)}")
              print(f"- 验证超额中位数提升：{s.get('median_validation_improvement')} pct")
          PY
      - name: 提交数据
        run: |
          if [[ -n "$(git status --porcelain frontend/public/data backend/data)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add frontend/public/data backend/data
            git commit -m "chore: 富集持仓+排行数据"
            git push
          else
            echo "无变化"
          fi
